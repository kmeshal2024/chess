name: chess
description: "A premium chess mobile game with stunning visuals and intelligent AI."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  google_fonts: ^6.2.1
  uuid: ^4.5.1
  equatable: ^2.0.7
  bishop: ^1.4.4
  firebase_core: ^3.9.0
  cloud_firestore: ^5.6.0
  shared_preferences: ^2.3.4
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
